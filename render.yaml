region: singapore  # ✅ Closest region to India

services:
  - type: keyvalue
    name: nova-ai-redis
    plan: free
    region: singapore  # ✅ Changed from oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: nova-ai-backend
    runtime: docker
    plan: starter
    region: singapore  # ✅ Changed from oregon
    numInstances: 1
    pullRequestPreviewsEnabled: false
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "false"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "info"
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: "nova_ai"
      - key: MONGODB_REQUIRED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nova-ai-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: AI_PROVIDER
        value: "auto"

      # --- AI Model Config --- #
      - key: GEMINI_IMAGE_MODEL
        value: "gemini-2.5-flash-image"
      - key: OPENAI_MODEL
        value: "gpt-4o"
      - key: ANTHROPIC_MODEL
        value: "claude-sonnet-4-20250514"
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: OPENROUTER_MODEL
        value: "anthropic/claude-sonnet-4-20250514"  # ✅ Fixed: gave it a default

      - key: AI_IMAGE_REQUEST_TIMEOUT_SECONDS
        value: "180"

      # --- AI API Keys --- #
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ✅ Removed GOOGLE_API_KEY — duplicate of GEMINI_API_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      # --- Email Config --- #
      - key: EMAIL_PROVIDER
        value: "smtp"
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: "NOVA AI"
      - key: EMAIL_REPLY_TO
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"

  - type: web
    name: nova-ai-frontend
    runtime: static
    region: singapore  # ✅ Changed from oregon
    pullRequestPreviewsEnabled: false
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist  # ✅ Correct for Vite
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to: https://nova-ai-backend.onrender.com
      - key: NODE_VERSION
        value: "20"